<head>

    <style>
        body {
            background-color: #000;
        }

        .pantalla-carga {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #000;
        }

        .loading-logo {
            width: 60vw;
            max-width: 280px;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 15px rgba(56, 182, 255, 0.4));
            user-drag: none;
            -webkit-user-drag: none;
            will-change: transform, opacity;
        }

        .spinner-loader {
            width: 10px;
            height: 1px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #38B6FF;
            border-radius: 50%;
            animation: giro 1s linear infinite;
            margin-bottom: 20px;
        }

        .loading-row {
            display: flex;
            align-items: center; 
            justify-content: center;
            gap: 15px; 
        }

        .spinner-loader {
            width: 25px; 
            height: 25px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #38B6FF;
            border-radius: 50%;
            animation: giro 1s linear infinite;
        }

        @keyframes giro {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }


    </style>
</head>

<body>
    <div id="app">
        <div class="pantalla-carga">
            <img src="favicon.png" alt="Cargando Zapping Stream" class="loading-logo" />

            <div class="loading-row">
                <div class="spinner-loader"></div>
                <!--<div class="texto-loader">Cargando...</div>-->
            </div>

        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="_framework/blazor.webview.js" autostart="false"></script>
    <script>

        document.addEventListener("DOMContentLoaded", function () {

            // Le damos un respiro de 500ms al WebView de Android

            // para que termine de inyectar el puente 'window.external'

            setTimeout(function () {

                Blazor.start().catch(err => console.error("Error al iniciar Blazor: ", err));

            }, 500);

        });</script>

    <script>
        let isDown = false;
        let startX;
        let scrollLeft;
        let isDragging = false;

        document.addEventListener('mousedown', (e) => {
            const slider = e.target.closest('.channel-row');
            if (!slider) return;

            isDown = true;
            isDragging = false;
            startX = e.pageX - slider.offsetLeft;
            scrollLeft = slider.scrollLeft;
        });

        document.addEventListener('mouseleave', (e) => {
            if (!isDown) return;
            const slider = e.target.closest('.channel-row');
            if (slider) isDown = false;
        });

        document.addEventListener('mouseup', (e) => {
            const slider = e.target.closest('.channel-row');
            if (!slider) return;
            isDown = false;

            setTimeout(() => {
                isDragging = false;
            }, 50);
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            const slider = e.target.closest('.channel-row');
            if (!slider) return;

            e.preventDefault();
            const x = e.pageX - slider.offsetLeft;
            const walk = (x - startX) * 1.5;

            if (Math.abs(walk) > 5) {
                isDragging = true;
            }

            slider.scrollLeft = scrollLeft - walk;
        });

        document.addEventListener('click', (e) => {
            if (isDragging) {
                e.preventDefault();
                e.stopPropagation();
            }
        }, true);
    </script>

    <script>
        // Tu función para abrir los vivos de YouTube intacta.
        window.navegarYouTube = (url) => {
            const esTVoMovil = /Android|webOS|Tizen|iPhone|iPad|iPod/i.test(navigator.userAgent);
            if (esTVoMovil) {
                window.location.href = url;
            } else {
                window.open(url, "_blank");
            }
        };
