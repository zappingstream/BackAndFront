<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Zapping Stream" />
    <meta property="og:description" content="Todo el universo del streaming argentino en vivo" />
    <meta property="og:url" content="https://zappingstream.github.io" />
    <meta property="og:image" content="https://zappingstream.github.io/favicon.png" />
    <title>Zapping Stream</title>
    <base href="/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="ZappingStreamingapp.styles.css" rel="stylesheet" />

    <style>
        body {
            background-color: #000;
        }

        .pantalla-carga {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #000;
        }

        .loading-logo {
            width: 60vw;
            max-width: 280px;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 15px rgba(56, 182, 255, 0.4));
            user-drag: none;
            -webkit-user-drag: none;
            will-change: transform, opacity;
        }

        .loading-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .spinner-loader {
            width: 25px;
            height: 25px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #38B6FF;
            border-radius: 50%;
            animation: giro 1s linear infinite;
        }

        @keyframes giro {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div id="app">
        <div class="pantalla-carga">
            <img src="favicon.png" alt="Cargando Zapping Stream" class="loading-logo" />
            <div class="loading-row">
                <div class="spinner-loader"></div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="_framework/blazor.webview.js" autostart="false"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            let intentosBlazor = 0;

            // Hacemos el log global para que los demás scripts también puedan usarlo

            function iniciarBlazor() {

                if (window.Blazor) {

                    Blazor.start().then(() => {
                        // Limpiamos la bandera de recarga si todo salió bien
                        sessionStorage.removeItem('zombie_reloaded');
                    }).catch(err => {

                        // --- ACÁ ESTÁ LA MAGIA PARA SALVAR EL ERROR ---
                        if (err.message.includes('receiveMessage') || err.message.includes('not a function')) {
                            // Verificamos no haber recargado ya para evitar un loop infinito
                            if (!sessionStorage.getItem('zombie_reloaded')) {
                                sessionStorage.setItem('zombie_reloaded', 'true');

                                // Recargamos el WebView
                                setTimeout(() => { window.location.reload(); }, 200);
                            } else {
                            }
                        }
                    });
                } else if (intentosBlazor < 60) {
                    intentosBlazor++;
                    setTimeout(iniciarBlazor, 50);
                } else {
                }
            }

            // Damos un margen inicial mínimo por el cold boot zombie de Android
            setTimeout(iniciarBlazor, 200);
        });
    </script>


    <script>
        let isDown = false;
        let startX;
        let scrollLeft;
        let isDragging = false;

        document.addEventListener('mousedown', (e) => {
            const slider = e.target.closest('.channel-row');
            if (!slider) return;

            isDown = true;
            isDragging = false;
            startX = e.pageX - slider.offsetLeft;
            scrollLeft = slider.scrollLeft;
        });

        document.addEventListener('mouseleave', (e) => {
            if (!isDown) return;
            const slider = e.target.closest('.channel-row');
            if (slider) isDown = false;
        });

        document.addEventListener('mouseup', (e) => {
            const slider = e.target.closest('.channel-row');
            if (!slider) return;
            isDown = false;

            setTimeout(() => {
                isDragging = false;
            }, 50);
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            const slider = e.target.closest('.channel-row');
            if (!slider) return;

            e.preventDefault();
            const x = e.pageX - slider.offsetLeft;
            const walk = (x - startX) * 1.5;

            if (Math.abs(walk) > 5) {
                isDragging = true;
            }

            slider.scrollLeft = scrollLeft - walk;
        });

        document.addEventListener('click', (e) => {
            if (isDragging) {
                e.preventDefault();
                e.stopPropagation();
            }
        }, true);
    </script>

    <script>
        window.navegarYouTube = (url) => {
            const esTVoMovil = /Android|webOS|Tizen|iPhone|iPad|iPod/i.test(navigator.userAgent);

            if (esTVoMovil) {
                window.location.href = url;
            } else {
                window.open(url, "_blank");
            }
        };

    
    </script>

</body>
</html>
